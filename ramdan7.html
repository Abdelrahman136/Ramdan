<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رمضان كريم 🌙</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #f5c842;
      --deep-gold: #c9962a;
      --sky: #0a1628;
      --sky-mid: #112244;
      --sky-light: #1a3a6b;
      --glow: rgba(245,200,66,0.18);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 70% 10%, #1a3a6b 0%, #0d1f3c 40%, #050d1a 100%);
      font-family: 'Tajawal', sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== Stars ===== */
    #stars-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== Moon ===== */
    .moon {
      position: fixed;
      top: 40px;
      right: 60px;
      font-size: 160px;
      line-height: 1;
      z-index: 2;
      filter: drop-shadow(0 0 40px rgba(255,220,80,0.7)) drop-shadow(0 0 80px rgba(255,180,0,0.4));
      animation: moonFloat 8s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes moonFloat {
      0%   { transform: translateY(0px) translateX(0px) rotate(-5deg); }
      30%  { transform: translateY(-25px) translateX(-15px) rotate(0deg); }
      60%  { transform: translateY(-10px) translateX(20px) rotate(5deg); }
      100% { transform: translateY(0px) translateX(0px) rotate(-5deg); }
    }

    /* ===== Lanterns ===== */
    .lantern {
      position: fixed;
      font-size: 3rem;
      pointer-events: none;
      z-index: 1;
      animation: lanternSway 4s ease-in-out infinite;
    }
    .lantern:nth-child(1) { top: 0; left: 5%; animation-delay: 0s; }
    .lantern:nth-child(2) { top: 0; left: 20%; animation-delay: 1s; font-size: 2rem; }
    .lantern:nth-child(3) { top: 0; right: 20%; animation-delay: 0.5s; font-size: 2.5rem; }
    .lantern:nth-child(4) { top: 0; right: 5%; animation-delay: 1.5s; }

    @keyframes lanternSway {
      0%, 100% { transform: rotate(-8deg) translateY(0); }
      50%       { transform: rotate(8deg) translateY(10px); }
    }

    /* ===== Main Content ===== */
    .container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 20px 60px;
    }

    /* ===== Allah Name Center ===== */
    .allah-center {
      text-align: center;
      margin-bottom: 10px;
      animation: allahPulse 3s ease-in-out infinite;
    }

    @keyframes allahPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px var(--gold)); }
      50%       { transform: scale(1.04); filter: drop-shadow(0 0 50px var(--gold)); }
    }

    .allah-name {
      font-family: 'Amiri', serif;
      font-size: clamp(5rem, 15vw, 10rem);
      color: var(--gold);
      text-shadow: 0 0 30px rgba(245,200,66,0.8), 0 0 60px rgba(245,200,66,0.4);
      line-height: 1.1;
    }

    /* ===== Rotating Names ===== */
    .rotating-name {
      font-family: 'Amiri', serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      color: var(--deep-gold);
      text-align: center;
      min-height: 3rem;
      margin-bottom: 30px;
      animation: fadeNameIn 1s ease;
      text-shadow: 0 0 15px rgba(200,150,40,0.5);
    }

    @keyframes fadeNameIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ===== Title ===== */
    .page-title {
      font-family: 'Amiri', serif;
      font-size: clamp(2rem, 6vw, 4rem);
      color: #fff;
      text-align: center;
      margin-bottom: 8px;
      text-shadow: 0 2px 20px rgba(245,200,66,0.5);
      letter-spacing: 2px;
    }

    .page-sub {
      font-size: 1.1rem;
      color: rgba(255,255,255,0.5);
      text-align: center;
      margin-bottom: 40px;
    }

    /* ===== Input Area ===== */
    .input-area {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 30px;
    }

    #nameInput {
      background: rgba(255,255,255,0.07);
      border: 2px solid var(--deep-gold);
      border-radius: 50px;
      padding: 14px 28px;
      font-size: 1.2rem;
      font-family: 'Tajawal', sans-serif;
      color: #fff;
      outline: none;
      width: 280px;
      text-align: center;
      transition: all 0.3s;
    }

    #nameInput:focus {
      border-color: var(--gold);
      background: rgba(245,200,66,0.1);
      box-shadow: 0 0 20px rgba(245,200,66,0.2);
    }

    #nameInput::placeholder { color: rgba(255,255,255,0.35); }

    .btn {
      background: linear-gradient(135deg, var(--gold), var(--deep-gold));
      color: #0a1628;
      border: none;
      border-radius: 50px;
      padding: 14px 34px;
      font-size: 1.2rem;
      font-family: 'Tajawal', sans-serif;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 20px rgba(245,200,66,0.3);
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(245,200,66,0.5);
    }

    /* ===== Message ===== */
    #message {
      font-family: 'Amiri', serif;
      font-size: clamp(1.6rem, 4vw, 2.8rem);
      color: var(--gold);
      text-align: center;
      min-height: 3rem;
      text-shadow: 0 0 20px rgba(245,200,66,0.6);
      animation: fadeIn 0.8s ease;
      margin-bottom: 10px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ===== Dhikr Floating ===== */
    .dhikr-float {
      position: fixed;
      font-family: 'Amiri', serif;
      font-size: 1.3rem;
      color: rgba(245,200,66,0.75);
      pointer-events: none;
      z-index: 5;
      text-shadow: 0 0 10px rgba(245,200,66,0.4);
      white-space: nowrap;
      animation: dhikrRise 5s ease-out forwards;
    }

    @keyframes dhikrRise {
      0%   { opacity: 0; transform: translateY(0) scale(0.8); }
      15%  { opacity: 1; transform: translateY(-20px) scale(1); }
      70%  { opacity: 0.8; }
      100% { opacity: 0; transform: translateY(-150px) scale(0.9); }
    }

    /* ===== Falling Gifts ===== */
    .gift-fall {
      position: fixed;
      top: -80px;
      font-size: 2rem;
      pointer-events: none;
      z-index: 6;
      animation: giftFall linear forwards;
    }

    @keyframes giftFall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
      80%  { opacity: 1; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    /* ===== Divider ===== */
    .divider {
      width: 200px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      margin: 20px auto;
    }

    /* ===== Mosque Silhouette ===== */
    .mosque-row {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      align-items: flex-end;
      pointer-events: none;
      z-index: 1;
      opacity: 0.18;
      font-size: 5rem;
      padding-bottom: 0;
    }
  </style>
</head>
<body>

  <!-- Stars -->
  <canvas id="stars-canvas"></canvas>

  <!-- Lanterns -->
  <div class="lantern">🪔</div>
  <div class="lantern">🏮</div>
  <div class="lantern">🏮</div>
  <div class="lantern">🪔</div>

  <!-- Moon -->
  <div class="moon">🌙</div>

  <!-- Mosque Row -->
  <div class="mosque-row">
    <span>🕌</span><span>🕌</span><span>🕌</span><span>🕌</span><span>🕌</span>
  </div>

  <!-- Main -->
  <div class="container">
    <!-- Allah Name -->
    <div class="allah-center">
      <div class="allah-name">الله</div>
    </div>
    <div class="rotating-name" id="rotatingName">الرحمن الرحيم</div>

    <div class="divider"></div>

    <h1 class="page-title">رمضان كريم 🌙</h1>
    <p class="page-sub">كل عام وأنتم بخير — أجواء مصرية مبهجة</p>

    <div class="input-area">
      <input type="text" id="nameInput" placeholder="اكتب اسمك هنا...">
      <button class="btn" onclick="showGreeting()">🎉 عرض التهنئة</button>
    </div>

    <div id="message"></div>
  </div>

  <script>
    // === Stars Canvas ===
    const canvas = document.getElementById('stars-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const stars = Array.from({length: 200}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 1.8 + 0.3,
      alpha: Math.random(),
      speed: Math.random() * 0.012 + 0.004
    }));

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.alpha += s.speed;
        if (s.alpha > 1 || s.alpha < 0) s.speed *= -1;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 240, 180, ${Math.abs(Math.sin(s.alpha))})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });

    // === Rotating Allah Names ===
    const allahNames = [
      'الرحمن الرحيم','الملك القدوس','السلام المؤمن','العزيز الجبار',
      'الخالق البارئ','الغفار القهار','الرزاق الفتاح','العليم الحكيم',
      'اللطيف الخبير','الحليم العظيم','الشكور العلي','الكبير الحفيظ',
      'المقيت الحسيب','الجليل الكريم','الرقيب المجيب','الواسع الحكيم',
      'الودود المجيد','الشهيد الحق','الوكيل القوي','المتين الولي',
      'الحميد المحصي','المبدئ المعيد','المحيي المميت','الحي القيوم',
      'الواجد الماجد','الواحد الأحد','الصمد','القادر المقتدر',
      'المقدم المؤخر','الأول الآخر','الظاهر الباطن','الوالي المتعال',
      'البر التواب','المنتقم العفو','الرؤوف المالك','ذو الجلال والإكرام',
      'المقسط الجامع','الغني المغني','المانع الضار','النافع النور',
      'الهادي البديع','الباقي الوارث','الرشيد الصبور'
    ];
    let nameIdx = 0;
    const rotEl = document.getElementById('rotatingName');

    function rotateName() {
      rotEl.style.opacity = 0;
      setTimeout(() => {
        rotEl.textContent = allahNames[nameIdx++ % allahNames.length];
        rotEl.style.transition = 'opacity 0.8s';
        rotEl.style.opacity = 1;
      }, 400);
    }
    setInterval(rotateName, 3000);

    // === Floating Dhikr ===
    const dhikrs = [
      'سبحان الله وبحمده','اللهم بلغنا رمضان','الحمد لله رب العالمين',
      'لا إله إلا الله','استغفر الله العظيم','اللهم اجعلنا من عتقاء رمضان',
      'رمضان كريم 🌙','اللهم ارحم أمواتنا','سبحان الله العظيم وبحمده',
      'اللهم أعنا على ذكرك وشكرك وحسن عبادتك','كل عام وأنتم بخير 🎉',
      'اللهم بارك لنا في رمضان','رمضان شهر الرحمة والمغفرة',
      'تقبل الله منا ومنكم','اللهم إنك عفو تحب العفو فاعف عنا'
    ];

    function spawnDhikr() {
      const el = document.createElement('div');
      el.className = 'dhikr-float';
      el.textContent = dhikrs[Math.floor(Math.random() * dhikrs.length)];
      el.style.left = Math.random() * 85 + '%';
      el.style.top = (50 + Math.random() * 40) + '%';
      el.style.fontSize = (1.1 + Math.random() * 0.8) + 'rem';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 5200);
    }
    setInterval(spawnDhikr, 1800);
    spawnDhikr();

    // === Falling Gifts ===
    const gifts = ['🎁','🪔','🏮','⭐','✨','🌙','🎆','🎇','🪅','🎊','🎉','🕌','🌹','🍬','🥐','🍇'];

    function spawnGift() {
      const el = document.createElement('div');
      el.className = 'gift-fall';
      el.textContent = gifts[Math.floor(Math.random() * gifts.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.fontSize = (1.5 + Math.random() * 2) + 'rem';
      const dur = 4 + Math.random() * 5;
      el.style.animationDuration = dur + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), dur * 1000 + 200);
    }
    setInterval(spawnGift, 700);
    for (let i = 0; i < 8; i++) setTimeout(spawnGift, i * 300);

    // === Greeting ===
    function showGreeting() {
      const name = document.getElementById('nameInput').value.trim();
      const msgEl = document.getElementById('message');
      msgEl.style.animation = 'none';
      setTimeout(() => {
        msgEl.style.animation = 'fadeIn 0.8s ease';
        if (name) {
          msgEl.innerHTML = `🌙 كل سنة وأنتَ طيب يا <span style="color:#fff">${name}</span> 🎉<br>
          <span style="font-size:1.4rem;color:rgba(255,255,255,0.7)">تقبل الله منا ومنكم صالح الأعمال</span>`;
        } else {
          msgEl.innerHTML = `🌙 رمضان كريم على الجميع 🎉<br>
          <span style="font-size:1.4rem;color:rgba(255,255,255,0.7)">كل عام وأنتم بخير وصحة وسعادة</span>`;
        }
        // Burst of gifts
        for (let i = 0; i < 20; i++) setTimeout(spawnGift, i * 80);
      }, 10);
    }

    document.getElementById('nameInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') showGreeting();
    });
  </script>
</body>
</html>
